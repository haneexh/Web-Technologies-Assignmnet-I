<!DOCTYPE html>
<html lang="en">
<head>
    <title>Registration Form</title>
</head>
<body style="background-color: lightblue;">
    <h1 align="center">Registration Form</h1>
    <br> 
    <br>
    <form action="success.html">
        <table align="center">
        <tr>
            <td>Name:</td>
            <td><input type="text" id="name" name="name" required></td>
        </tr>
        <tr>
            <td>Gender:</td>
            <td>
                <input type="radio" id="male" name="gender" value="male" required>Male
                <input type="radio" id="female" name="gender" value="female" required>Female
                <input type="radio" id="other" name="gender" value="Other" required>Other
            </td>
        </tr>
        <tr> 
            <td>Languages Known:</td>
            <td><input type="text" id="languages" name="languages" required></td>
        </tr>
        <tr>
            <td>Email:</td>
            <td><input type="email" id="email" name="email" required></td>
        </tr>
        <tr>
            <td>Mobile No:</td>
            <td><input type="text" id="mobile" name="mobile" required></td>
        </tr>
        <tr>
            <td>Address:</td>
            <td><textarea rows="3" cols="30" id="address" name="address" required></textarea></td>
        </tr>
        <tr>
            <td>Job locations:</td>
            <td>
                <select name="job_locations" id="job_locations" required>
                    <option value="bangalore">Bangalore</option>
                    <option value="chennai">Chennai</option>
                    <option value="hyderabad">Hyderabad</option>
                    <option value="pune">Pune</option>
                </select>
            </td>
        </tr> 
        <tr>
            <td>Upload Resume:</td>
            <td><input type="file" id="resume" name="resume"></td>
        </tr>   
        <tr>
            <td><input type="submit" value="Submit"></td>
            <td><input type="reset" value="Reset"></td>
        </tr>
        </table>
    </form>
    <h3>C.Haneesh Balaji</h3>
    <h3>24881A1286</h3>
</body>
</html>
